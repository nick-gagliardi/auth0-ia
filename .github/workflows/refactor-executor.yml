name: Refactor Executor

on:
  workflow_dispatch:
    inputs:
      docs_repo:
        description: "GitHub repo to refactor (owner/name)"
        required: true
        default: "auth0/docs-v2"
      base_branch:
        description: "Base branch to target"
        required: true
        default: "main"
      branch_name:
        description: "Branch name to create (optional; autogenerated if empty)"
        required: false
        default: ""
      dry_run:
        description: "If true, do not write/commit/push/PR; only validate and print a summary"
        required: true
        type: boolean
        default: true
      plan_json:
        description: "Refactor plan JSON (moves, redirects, linkRewrites). Paste full JSON."
        required: true
      commit_message:
        description: "Commit message (ignored in dry-run)"
        required: false
        default: "chore(docs): apply refactor plan"
      pr_title:
        description: "PR title (ignored in dry-run)"
        required: false
        default: "Docs refactor (automated)"
      pr_body:
        description: "PR body (ignored in dry-run)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refactor-executor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refactor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout auth0-ia (this repo)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write plan JSON to file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          cat > .tmp/refactor-plan.json << 'JSON'
          ${{ inputs.plan_json }}
          JSON
          node -e "JSON.parse(require('fs').readFileSync('.tmp/refactor-plan.json','utf8')); console.log('Plan JSON: OK')"

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.docs_repo }}
          path: docs-v2
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Apply refactor plan
        id: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/refactor-executor.mjs \
            --repoPath docs-v2 \
            --targetRepo "${{ inputs.docs_repo }}" \
            --baseBranch "${{ inputs.base_branch }}" \
            --branchName "${{ inputs.branch_name }}" \
            --planFile .tmp/refactor-plan.json \
            --dryRun "${{ inputs.dry_run }}" \
            --commitMessage "${{ inputs.commit_message }}" \
            --prTitle "${{ inputs.pr_title }}" \
            --prBody "${{ inputs.pr_body }}" \
            | tee .tmp/refactor-result.json

          # If the script printed JSON, expose a few fields as step outputs.
          node - <<'NODE'
          const fs = require('fs');
          const p = '.tmp/refactor-result.json';
          const raw = fs.readFileSync(p,'utf8').trim();
          // Find last JSON object in the output.
          const start = raw.lastIndexOf('{');
          if (start < 0) process.exit(0);
          const json = JSON.parse(raw.slice(start));
          const out = process.env.GITHUB_OUTPUT;
          const kv = {
            branchName: json.branchName || '',
            prUrl: json.prUrl || '',
            dryRun: String(Boolean(json.dryRun)),
          };
          let s='';
          for (const [k,v] of Object.entries(kv)) s += `${k}=${String(v).replace(/\n/g,' ')}\n`;
          fs.appendFileSync(out, s);
          NODE

      - name: Summary
        if: always()
        run: |
          echo "branchName: ${{ steps.apply.outputs.branchName }}"
          echo "prUrl: ${{ steps.apply.outputs.prUrl }}"
          echo "dryRun: ${{ steps.apply.outputs.dryRun }}"
